spring:
  datasource:
    url: jdbc:mysql://localhost:3306/deploymentPlatform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: root
    password: UTKARSH@123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

app:
  jwt:
    secret: miniheroku-super-secret-key-change-this-in-production-32chars
    expiration: 86400000

  docker:
    socket-path: tcp://localhost:2375
    container-port: 8080
    host-port-range-start: 3000
    host-port-range-end: 9000
    build-timeout-minutes: 10
    build-dir: C:/tmp/deployments

  nginx:
    enabled: false
    sites-available: /etc/nginx/sites-available
    sites-enabled: /etc/nginx/sites-enabled